<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid lines -->
  <g stroke="#2d1b4e" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Ghost/phantom decoration left -->
  <text x="40" y="130" font-family="monospace" font-size="72" fill="#2d1b4e" opacity="0.3" filter="url(#glow)">👻</text>

  <!-- Main title -->
  <text x="400" y="105"
    font-family="'Courier New', Courier, monospace"
    font-size="82"
    font-weight="900"
    text-anchor="middle"
    fill="url(#text-grad)"
    filter="url(#glow)"
    letter-spacing="12">WRAITH</text>

  <!-- Tagline -->
  <text x="400" y="148"
    font-family="'Courier New', Courier, monospace"
    font-size="14"
    text-anchor="middle"
    fill="#9f7aea"
    letter-spacing="4"
    opacity="0.9">vanish from the internet.</text>

  <!-- Version badge area - subtle bottom bar -->
  <rect x="0" y="182" width="800" height="18" fill="#1a0a2e" opacity="0.8" rx="0"/>
  <text x="400" y="195" font-family="monospace" font-size="10" text-anchor="middle" fill="#6b21a8" letter-spacing="2" opacity="0.7">privacy scrubbing engine · data broker opt-outs · breach monitoring · whois auditing</text>
</svg>
